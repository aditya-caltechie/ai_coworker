# CI: install deps with uv and run tests (pytest).
# Reference: uv + pytest patterns from astral-sh/setup-uv and Python CI best practices.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run tests
        run: uv run pytest tests/ -v
